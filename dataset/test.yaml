# 1. 数据集名字（对应文件夹名和文件名）
dataset: my_data

# 2. 如果你的文件是用逗号分隔的（默认是 tab）
field_separator: ","

# 3. 告诉 RecBole 加载哪些列，以及它们属于什么类型（inter 表示交互数据）
# 这里的名字要和 .inter 文件里的表头名一致（冒号前面的部分）
load_col:
    inter: [user_id, item_id, rating, timestamp]

# 4. 指定内部核心字段映射
# 告诉模型：哪个列是用户ID，哪个是物品ID，哪个是标签
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# 5. 如果是 CTR 任务（多场景通常是 CTR），需要指定 Label
# 如果你的 Score 是 0/1 点击，则用 LABEL_FIELD
# LABEL_FIELD: rating