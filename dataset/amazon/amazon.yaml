# =========================================================
#  Amazon Dataset Configuration for RecBole
# =========================================================

# 1. 基础路径配置
# ---------------------------------------------------------
data_path: dataset/
dataset: amazon

# 2. 文件格式配置
# ---------------------------------------------------------
field_separator: "\t"
seq_separator: " "

# 3. 核心字段映射
# ---------------------------------------------------------
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
LABEL_FIELD: label
TIME_FIELD: timestamp

# 4. 加载列配置
# ---------------------------------------------------------
load_col:
    inter:
        - user_id
        - item_id
        - label
        - timestamp
        - domain
    user:
        - user_id
        - main_domain
        - inter_count
        - avg_rating
    item:
        - item_id
        - domain
        - inter_count
        - avg_rating
        - positive_rate

# 5. 特征预处理
# ---------------------------------------------------------
# 归一化数值型特征
normalize_field:
    - inter_count
    - avg_rating
    - positive_rate
    - timestamp

# 6. 过滤与划分设置
# ---------------------------------------------------------
# 过滤掉交互少于 5 次的用户/物品
min_user_inter_num: 5
min_item_inter_num: 5

# 数据集划分方式
eval_args:
    split: {'RS': [0.8, 0.1, 0.1]}  # 训练:验证:测试 = 8:1:1
    group_by: user  # 按用户分组（保证用户不会同时出现在训练和测试集）
    order: TO  # Time Ordering - 按时间排序
    mode: labeled  # 标签模式（适用于CTR预测）

# 7. 模型参数（以 DeepFM 为例）
# ---------------------------------------------------------
embedding_size: 16
mlp_hidden_size: [64, 64, 64]
dropout_prob: 0.2

# 8. 训练参数
# ---------------------------------------------------------
epochs: 50
train_batch_size: 2048
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 10
